name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip -q
      - run: python -m pip install -e '.[dev]' -q
      - name: Run pytest
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short 2>&1 | tee pytest-output.txt
      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: error
      - run: python -m compileall -q src
      - name: Prepare Compose environment
        run: |
          cp .env.example .env
          printf '\nPUID=%s\nPGID=%s\n' "$(id -u)" "$(id -g)" >> .env
          mkdir -p data
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build quality image
        run: docker compose --profile demo build quality-demo
      - name: Run quality demo container
        run: docker compose --profile demo run --rm quality-demo
