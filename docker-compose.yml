x-collector-common: &collector-common
  build:
    context: .
  env_file:
    - .env
  restart: unless-stopped
  init: true
  working_dir: /app
  environment:
    PYTHONUNBUFFERED: "1"
    TZ: ${TZ:-Asia/Seoul}
  volumes:
    - ./logs:/app/logs
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  account-collector:
    <<: *collector-common
    command: ["python", "account_collector.py"]
    mem_limit: 256m

  binance-collector:
    <<: *collector-common
    command: ["python", "binance.py"]
    mem_limit: 384m

  bithumb-collector:
    <<: *collector-common
    command: ["python", "bithumb_collector.py"]
    mem_limit: 512m

  data-quality-manager:
    build:
      context: .
      dockerfile: Dockerfile.data-quality
    env_file:
      - .env
    restart: "no"
    init: true
    working_dir: /app
    command: ["python", "-m", "data_quality.main", "--mode", "auto"]
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 8g
